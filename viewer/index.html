<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Projection Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .node-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -100%);
            margin-top: -5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            max-width: 350px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #info-panel h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #4A90E2;
            font-weight: 600;
        }

        #info-panel .metric {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 12px;
        }

        #info-panel .metric-label {
            color: #999;
        }

        #info-panel .metric-value {
            color: #e0e0e0;
            font-weight: 500;
        }

        #details-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
            backdrop-filter: blur(10px);
            display: none;
        }

        #details-panel.visible {
            display: block;
        }

        #details-panel h3 {
            font-size: 14px;
            color: #4A90E2;
            margin-bottom: 10px;
            font-weight: 600;
        }

        #details-panel .detail-row {
            margin: 8px 0;
            font-size: 12px;
        }

        #details-panel .detail-label {
            color: #999;
            margin-bottom: 3px;
        }

        #details-panel .detail-value {
            color: #e0e0e0;
            line-height: 1.4;
        }

        #details-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #999;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        #details-panel .close-btn:hover {
            color: #fff;
        }

        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 11px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #controls-help .control-row {
            margin: 3px 0;
            display: flex;
            align-items: center;
        }

        #controls-help kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 8px;
            font-family: monospace;
            font-size: 10px;
            min-width: 60px;
            display: inline-block;
        }

        #view-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            z-index: 100;
            backdrop-filter: blur(10px);
            min-width: 200px;
        }

        #view-controls h3 {
            font-size: 13px;
            color: #4A90E2;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #view-controls .control-group {
            margin-bottom: 15px;
        }

        #view-controls .control-group:last-child {
            margin-bottom: 0;
        }

        #view-controls label {
            display: block;
            font-size: 11px;
            color: #999;
            margin-bottom: 5px;
        }

        #view-controls input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            border-radius: 2px;
        }

        #view-controls input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: #4A90E2;
            cursor: pointer;
            border-radius: 50%;
        }

        #view-controls input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #4A90E2;
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }

        #view-controls .value-display {
            display: inline-block;
            color: #e0e0e0;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        #view-controls button {
            width: 100%;
            padding: 8px;
            background: #4A90E2;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        #view-controls button:hover {
            background: #357ABD;
        }

        #view-controls button:active {
            background: #2c5f99;
        }

        #view-controls button:disabled {
            background: rgba(74, 144, 226, 0.3);
            cursor: not-allowed;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95);
            padding: 30px 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            z-index: 1000;
        }

        #loading.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4A90E2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar styling */
        #details-panel::-webkit-scrollbar {
            width: 8px;
        }

        #details-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        #details-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        #details-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading 3D projection...</div>
    </div>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
        <div id="labels-container"></div>
    </div>

    <div id="info-panel">
        <h2>Projection Info</h2>
        <div class="metric">
            <span class="metric-label">Focus Node:</span>
            <span class="metric-value" id="info-focus">-</span>
        </div>
        <div class="metric">
            <span class="metric-label">Threshold:</span>
            <span class="metric-value" id="info-threshold">-</span>
        </div>
        <div class="metric">
            <span class="metric-label">Max Depth:</span>
            <span class="metric-value" id="info-depth">-</span>
        </div>
        <div class="metric">
            <span class="metric-label">Nodes:</span>
            <span class="metric-value" id="info-nodes">-</span>
        </div>
        <div class="metric">
            <span class="metric-label">Edges:</span>
            <span class="metric-value" id="info-edges">-</span>
        </div>
        <div class="metric">
            <span class="metric-label">Max Degree:</span>
            <span class="metric-value" id="info-max-degree">-</span>
        </div>
    </div>

    <div id="details-panel">
        <button class="close-btn" onclick="window.UI.closeDetails()">×</button>
        <h3 id="details-title">Node Details</h3>
        <div id="details-content"></div>
    </div>

    <div id="controls-help">
        <div class="control-row">
            <kbd>Arrow Keys</kbd> <span>Rotate view</span>
        </div>
        <div class="control-row">
            <kbd>Mouse Drag</kbd> <span>Pan camera</span>
        </div>
        <div class="control-row">
            <kbd>Scroll</kbd> <span>Zoom in/out</span>
        </div>
        <div class="control-row">
            <kbd>Click Node</kbd> <span>Show details</span>
        </div>
    </div>

    <div id="view-controls">
        <h3>View Controls</h3>
        
        <div class="control-group">
            <label>
                <input type="checkbox" id="telescope-toggle" checked> 
                Telescope Effect
            </label>
        </div>

        <div class="control-group">
            <label>
                Zoom Sensitivity
                <span class="value-display" id="telescope-value">1.0x</span>
            </label>
            <input type="range" id="telescope-slider" min="5" max="20" value="10" step="1">
        </div>

        <div class="control-group">
            <label>
                Label Detail (LOD)
                <span class="value-display" id="lod-value">30</span>
            </label>
            <input type="range" id="lod-slider" min="5" max="100" value="30" step="5">
        </div>

        <div class="control-group">
            <label>Node Size Scale</label>
            <input type="range" id="node-scale-slider" min="50" max="200" value="100" step="10">
            <span class="value-display" id="node-scale-value">100%</span>
        </div>

        <div class="control-group">
            <button id="refresh-btn" onclick="window.viewer.reload()">🔄 Refresh View</button>
        </div>

        <div class="control-group">
            <button id="reset-camera-btn" onclick="window.viewer.resetCamera()">📷 Reset Camera</button>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Application modules -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
